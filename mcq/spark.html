  { q: "SBT (Simple Build Tool) and Maven are:", opts: ["Spark cluster deployment tools for managing executor configurations", "Build tools used to compile, test, and package Scala/Java Spark applications and manage their dependencies", "Spark SQL query plan visualization tools", "Distributed version control systems for Spark job code"], ans: 1, exp: "SBT (Simple Build Tool) and Maven are JVM build tools essential for Spark application development: SBT — the standard build tool for Scala projects. Uses a Scala-based DSL for build configuration (build.sbt). Key features: incremental compilation (only recompiles changed files), interactive shell (sbt console), test runner integration (ScalaTest, Specs2), assembly plugin for creating fat JARs (uber JARs) with all dependencies included. Maven — the standard for Java projects, also supports Scala via scala-maven-plugin. Uses XML pom.xml for configuration. Both tools: manage dependencies from Maven Central/Artifactory, handle transitive dependency resolution, and create deployable JAR artifacts. For Spark, the typical deliverable is a fat JAR submitted via spark-submit --class MyClass --master yarn myapp-assembly-1.0.jar." },
  // 63
  { q: "The collect() action in Spark:", opts: ["Applies a transformation to each partition and returns a new RDD", "Brings all RDD/DataFrame data from executors to the driver's memory as a local collection — risky for large datasets", "Collects metadata (schema, count) without moving actual data to the driver", "Triggers caching of the RDD on all executor nodes"], ans: 1, exp: "collect() is an action that pulls ALL data from all partitions across all executors into the Driver's JVM memory as a local Scala/Java/Python list. This is extremely dangerous for large datasets: a 100GB RDD collect() would attempt to load 100GB into the Driver's heap, almost certainly causing OutOfMemoryError. When to use collect(): only on small DataFrames/RDDs that you KNOW are small (e.g., after aggressive filtering, or aggregated results). Safer alternatives: take(n) — fetches only n rows; show(n) — displays n rows without returning all data; write() — saves to disk without collecting; foreach/foreachPartition — processes data on executors without moving it to driver. Always check dataset size before using collect()." },
  // 64
  { q: "The take(n) action in Spark:", opts: ["Returns the first n rows from the first partition only, always in deterministic order", "Returns n rows from the RDD/DataFrame, scanning as few partitions as needed — order is not guaranteed without explicit sort", "Triggers a full dataset scan and then samples n rows randomly", "Is equivalent to limit(n).collect() and always scans the entire dataset"], ans: 1, exp: "take(n) is an optimized action that returns exactly n elements from the RDD/DataFrame. Implementation: Spark starts scanning from the first partition. If the first partition has enough elements (≥ n), it returns them immediately without scanning other partitions. If not, it scans additional partitions incrementally. This means take(10) on a 1TB dataset is very fast — it only reads the first partition(s). Key caveat: without an explicit sort, the order of results is determined by partition ordering and internal storage, NOT guaranteed to be deterministic (results may differ between runs if partitions change). Use df.orderBy('column').take(n) for consistent results. take(n) vs limit(n): limit() is a transformation creating a new DataFrame; take() is an action returning local data." },
  // 65
  { q: "The show() action in Spark:", opts: ["Prints the full DataFrame to the driver console — equivalent to collect() for display purposes", "Displays a default of 20 rows of the DataFrame in a formatted table on the driver — it does NOT bring all data to the driver", "Triggers full computation and caches the result for subsequent show() calls", "Is a transformation that formats data as a string RDD for logging"], ans: 1, exp: "show() is a commonly used action for inspecting DataFrames. Default behavior: df.show() displays 20 rows in a formatted ASCII table on the console/notebook output. Configurable: df.show(50) shows 50 rows; df.show(20, truncate=False) shows full column content without truncation; df.show(20, vertical=True) shows each row as a vertical key-value list (useful for wide tables). Under the hood, show() calls df.take(numRows) which collects only those rows to the Driver — NOT the full dataset. This makes show() safe for large DataFrames. Important: show() does trigger computation (it's an action), so it will compute the entire lineage up to the point of show, but only returns numRows rows. In production, use write() instead of show() to save results." },
  // 66
  { q: "Calling cache() on a Spark DataFrame:", opts: ["Immediately computes and stores the DataFrame in memory across all executors", "Marks the DataFrame for caching at the default storage level (MEMORY_AND_DISK); actual caching occurs on the first action", "Forces the DataFrame to be stored only in RAM, failing if memory is insufficient", "Stores the DataFrame in the driver's local memory for fast access"], ans: 1, exp: "cache() behavior details: When you call df.cache(), Spark registers the DataFrame in the BlockManager with StorageLevel.MEMORY_AND_DISK. No computation happens yet — this is lazy. The first action on this DataFrame (e.g., df.count()) triggers computation AND caching: each partition is computed, stored in the BlockManager's memory (as JVM objects for MEMORY_AND_DISK in deserialized form, or as Tungsten binary for MEMORY_AND_DISK_SER), and the action result returned. Subsequent actions read from cache, skipping recomputation. MEMORY_AND_DISK means: try memory first; if a partition doesn't fit, write it to local disk. To explicitly release: df.unpersist(). In Spark 2+, DataFrame caching uses serialized Tungsten format by default (more compact than deserialized Java objects)." },
  // 67
  { q: "persist() differs from cache() in Spark because:", opts: ["persist() is eager (immediate computation); cache() is lazy", "persist() allows you to specify a StorageLevel (MEMORY_ONLY, DISK_ONLY, OFF_HEAP, etc.); cache() always uses the default level", "persist() is only available for RDDs; cache() works on DataFrames", "cache() supports off-heap storage; persist() only uses on-heap memory"], ans: 1, exp: "persist(storageLevel) gives you explicit control over where and how data is stored. Available StorageLevels: MEMORY_ONLY — store only in JVM heap (deserialized); evicts partitions that don't fit, recomputes them on access. MEMORY_ONLY_SER — serialize partitions to bytes before storing in heap; uses less memory but more CPU. MEMORY_AND_DISK — store in memory; overflow to local disk (default for cache()). MEMORY_AND_DISK_SER — serialized in memory, overflow to disk. DISK_ONLY — always write to local disk; useful for very large datasets accessed rarely. OFF_HEAP — store in Tungsten off-heap memory (requires spark.memory.offHeap.enabled=true); avoids GC. MEMORY_AND_DISK_2, etc. — replicate cached data across 2 nodes for fault tolerance. Choose based on: available memory, access frequency, recomputation cost, and GC sensitivity." },
  // 68
  { q: "Auto-scaling of nodes in a Spark cluster on YARN/cloud refers to:", opts: ["Spark automatically rebalances RDD partitions when new nodes join the cluster", "Dynamic allocation — Spark requests additional executors from the cluster manager during peaks and releases them during idle periods based on workload", "The cluster manager automatically upgrades node hardware when CPU usage exceeds 80%", "Spark duplicates executors on new nodes and replicates all cached RDDs automatically"], ans: 1, exp: "Spark Dynamic Resource Allocation (DRA) — enabled via spark.dynamicAllocation.enabled=true — allows Spark to automatically request and release executors based on workload: Scale-up: when tasks are queued waiting for executor slots longer than spark.dynamicAllocation.schedulerBacklogTimeout (default 1s), Spark requests additional executors from YARN/Kubernetes up to spark.dynamicAllocation.maxExecutors. Scale-down: when an executor has been idle (no tasks) for spark.dynamicAllocation.executorIdleTimeout (default 60s), Spark requests its removal. Requires External Shuffle Service (spark.shuffle.service.enabled=true) so shuffle files persist on NodeManager even after the executor is removed. DRA is essential for shared clusters where multiple jobs compete for resources — idle executors are released for other jobs." },
  // 69
  { q: "Having MORE partitions than tasks (over-partitioning) for a fixed data size:", opts: ["Always improves parallelism and should be maximized", "Creates many small tasks with high scheduling overhead, wastes slots on empty partitions, and can degrade performance despite apparent parallelism", "Reduces memory pressure since each partition is smaller", "Has no impact — Spark automatically merges small partitions"], ans: 1, exp: "Partition count tuning is critical for performance. Over-partitioning symptoms: many tasks complete in milliseconds (task scheduling overhead ~10-100ms per task dominates); executor cores sit idle waiting for scheduler; Spark UI shows hundreds of 'tiny' tasks per stage. Under-partitioning symptoms: a few tasks take minutes while other cores sit completely idle; out-of-memory errors (partitions too large); no parallelism. Rule of thumb: target 100-200MB per partition. For a 10GB dataset: 10,000 / 128MB ≈ 78 partitions (good). For shuffle partitions (groupBy, join): spark.sql.shuffle.partitions default is 200 — often too high for small data (use 2-4x the number of CPU cores) and too low for huge data. AQE (Adaptive Query Execution) in Spark 3.x can automatically coalesce small shuffle partitions." },
  // 70
  { q: "A Fog Node in distributed computing is:", opts: ["A failed master node that has been isolated from the cluster", "An edge computing node that extends cloud capabilities closer to data sources, reducing latency for IoT and real-time workloads", "A Spark worker node that exclusively handles shuffle and sort operations", "A virtual node in Kubernetes that aggregates container metrics"], ans: 1, exp: "Fog computing extends the cloud computing paradigm to the network edge, closer to where data is generated (IoT sensors, edge devices, factory floor systems). Architecture: Cloud (central, high-latency, high-throughput) → Fog Nodes (intermediate, local processing, lower latency) → IoT Devices (data source). Fog Node characteristics: limited compute/memory compared to cloud, deployed geographically close to data sources, performs pre-processing (filtering, aggregation, anomaly detection) locally to reduce bandwidth to cloud, enables real-time responses without cloud round-trip latency. Example: autonomous vehicle sensor fusion, smart factory defect detection, oil rig monitoring. Fog vs Edge: Fog nodes are more capable intermediaries; Edge is the device itself (e.g., the sensor). This contrasts with Spark worker nodes which are pure computation nodes in a centralized cluster." },
  // 71
  { q: "How does Spark Core enable higher-level libraries like MLlib and Spark SQL?", opts: ["MLlib and Spark SQL are independent frameworks that share only the cluster manager with Spark Core", "Spark Core provides the foundational RDD abstraction, distributed task scheduling, fault tolerance, and memory management that all higher-level APIs build on top of", "Spark SQL compiles to MapReduce; MLlib compiles to native code — neither uses Spark Core at runtime", "Higher-level libraries bypass Spark Core and communicate directly with YARN for better performance"], ans: 1, exp: "Spark Core is the foundation of the entire Spark ecosystem. It provides: (1) RDD abstraction — the fundamental distributed data structure with lineage tracking, transformations, and actions; (2) DAG Scheduler — converts RDD lineage into a DAG of stages, optimizes stage boundaries at shuffle points; (3) Task Scheduler — assigns stage tasks to available executor slots based on locality preference; (4) BlockManager — distributed key-value store managing RDD blocks in memory/disk across all nodes; (5) Network communication (Netty-based) — handles shuffle data transfer, RPC between driver and executors; (6) Fault tolerance — detects failed tasks via heartbeats, re-schedules on different executors using lineage. Higher-level libraries: Spark SQL's DataFrame API compiles to RDD operations; MLlib Pipelines use RDDs internally; Structured Streaming represents streams as micro-batch DataFrames — all ultimately execute through Spark Core's scheduler and executor infrastructure." },
];

let answered = 0, correct = 0, wrong = 0;

const CATEGORIES = [
  { label: "Spark Fundamentals & Ecosystem", range: [0, 10] },
  { label: "Cluster Architecture", range: [10, 20] },
  { label: "Distributed Computing Concepts", range: [20, 29] },
  { label: "Hadoop & MapReduce", range: [29, 41] },
  { label: "Spark Internals & Memory", range: [41, 55] },
  { label: "APIs, Optimization & Advanced Topics", range: [55, 71] }
];

function getCategoryFor(idx) {
  for (const cat of CATEGORIES) {
    if (idx >= cat.range[0] && idx < cat.range[1]) return cat.label;
  }
  return "";
}

function buildQuiz() {
  const container = document.getElementById('quiz-container');
  let html = '';
  let lastCat = '';

  QUESTIONS.forEach((q, i) => {
    const cat = getCategoryFor(i);
    if (cat !== lastCat) {
      html += `<div class="category-section"><div class="category-label">📂 ${cat}</div></div>`;
      lastCat = cat;
    }

    const keys = ['A', 'B', 'C', 'D'];
    let optsHtml = q.opts.map((opt, oi) => `
      <button class="opt" id="opt-${i}-${oi}" onclick="selectOpt(${i},${oi})">
        <span class="opt-key">${keys[oi]}</span>
        <span>${opt}</span>
      </button>`).join('');

    html += `
      <div class="q-card" id="qcard-${i}">
        <div class="q-header">
          <span class="q-num">Q${i+1}</span>
          <span class="q-text">${q.q}</span>
        </div>
        <div class="options">${optsHtml}</div>
        <div class="explanation" id="exp-${i}">💡 <strong>Explanation:</strong> ${q.exp}</div>
      </div>`;
  });

  container.innerHTML = html;
}

function selectOpt(qi, oi) {
  const q = QUESTIONS[qi];
  const card = document.getElementById(`qcard-${qi}`);
  const exp = document.getElementById(`exp-${qi}`);

  // Already answered?
  if (card.classList.contains('answered-correct') || card.classList.contains('answered-wrong')) return;

  answered++;
  const isCorrect = oi === q.ans;
  if (isCorrect) correct++;
  else wrong++;

  // Style all options
  for (let j = 0; j < q.opts.length; j++) {
    const btn = document.getElementById(`opt-${qi}-${j}`);
    btn.disabled = true;
    if (j === q.ans) btn.classList.add('correct');
    else if (j === oi && !isCorrect) btn.classList.add('wrong');
  }

  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');
  exp.classList.add('visible');

  updateStats();
}

function updateStats() {
  const total = QUESTIONS.length;
  const pct = answered === 0 ? 0 : Math.round((correct / answered) * 100);
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = (answered / total * 100) + '%';
}

function showResult() {
  const total = QUESTIONS.length;
  const skipped = total - answered;
  const pct = total === 0 ? 0 : Math.round((correct / total) * 100);

  document.getElementById('r-correct').textContent = correct;
  document.getElementById('r-wrong').textContent = wrong;
  document.getElementById('r-skip').textContent = skipped;
  document.getElementById('result-pct-text').textContent = pct + '%';

  const ring = document.getElementById('result-ring');
  ring.style.setProperty('--pct', pct + '%');

  const titles = ['Keep Practicing! 🔥', 'Getting There! ⚡', 'Solid Work! 💪', 'Almost Expert! 🚀', 'Spark Master! 🏆'];
  const msgs = [
    'Review the explanations and try again. Every expert was once a beginner!',
    'Good progress! Focus on the architecture and memory sections.',
    'Well done! You have strong Spark fundamentals.',
    'Impressive knowledge! Just a few gaps to fill in.',
    'Outstanding! You have mastered Apache Spark concepts.'
  ];
  const tier = Math.min(4, Math.floor(pct / 20));
  document.getElementById('result-title').textContent = titles[tier];
  document.getElementById('result-msg').textContent = msgs[tier];

  document.getElementById('result-panel').classList.add('visible');
}

function retryQuiz() {
  answered = 0; correct = 0; wrong = 0;
  document.getElementById('result-panel').classList.remove('visible');
  buildQuiz();
  updateStats();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Floating sparks
function createSparks() {
  const container = document.getElementById('sparks');
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.top = Math.random() * 100 + 'vh';
    s.style.animationDuration = (8 + Math.random() * 14) + 's';
    s.style.animationDelay = (Math.random() * 12) + 's';
    s.style.background = Math.random() > 0.5 ? 'var(--accent)' : 'var(--accent3)';
    s.style.width = s.style.height = (2 + Math.random() * 3) + 'px';
    container.appendChild(s);
  }
}

buildQuiz();
createSparks();
</script>
</body>
</html>
